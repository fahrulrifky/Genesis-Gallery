<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritual Genesis Gallery</title>

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://genesis-ritual.vercel.app/">
  <meta property="og:title" content="RITUAL GENESIS GALLERY">
  <meta property="og:description" content="Showcase your Genesis Card On-Chain">
  <meta property="og:image" content="https://genesis-ritual.vercel.app/twitter-poster.jpg">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://genesis-ritual.vercel.app/">
  <meta name="twitter:title" content="RITUAL GENESIS GALLERY">
  <meta name="twitter:description" content="Showcase your Genesis Card On-Chain">
  <meta name="twitter:image" content="https://genesis-ritual.vercel.app/twitter-poster.jpg">

  <link rel="icon" type="image/png" href="floating.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #eab308; /* Premium Gold */
      --accent-glow: rgba(234, 179, 8, 0.4);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', system-ui, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* --- LANDING PAGE --- */
    #landing-page {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      /* Background gambar yang diupload, asumsikan bernama 'landing-bg.png' di folder yang sama */
      background: url('landing-bg.png') center center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      text-align: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #landing-page::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      /* Overlay gelap agar teks lebih mudah dibaca dan memberikan kesan premium */
      background: radial-gradient(circle at center, rgba(9, 9, 11, 0.5) 0%, rgba(9, 9, 11, 0.95) 100%);
      backdrop-filter: blur(2px);
      z-index: 1;
    }
    .landing-content {
      position: relative;
      z-index: 2;
      padding: 3rem;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(234, 179, 8, 0.2);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      animation: floatIn 1.5s ease-out;
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .global-logo {
      position: fixed;
      top: 2rem;
      left: 2rem;
      width: 85px;
      height: 85px;
      object-fit: contain;
      animation: spinSlow 12s linear infinite;
      z-index: 10000;
      pointer-events: none;
      filter: drop-shadow(0 0 10px rgba(234, 179, 8, 0.3));
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .floating-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 400px;
      height: auto;
      transform: translate(-50%, -50%);
      z-index: 0;
      opacity: 0.25; /* Transparansi agar tidak menutupi teks */
      animation: floatObject 5s ease-in-out infinite;
      pointer-events: none; /* Agar tidak mengganggu klik */
    }
    @keyframes floatObject {
      0%, 100% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg); }
      50% { transform: translate(-50%, -50%) translateY(-25px) rotate(2deg); }
    }
    .landing-content h1 {
      font-family: 'Cinzel', serif;
      font-size: 3.5rem;
      margin: 0 0 1rem 0;
      background: linear-gradient(135deg, #fff, var(--accent), #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
      animation: shine 4s linear infinite;
    }
    @keyframes shine {
      to { background-position: 200% center; }
    }
    .landing-content p {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      letter-spacing: 1px;
    }
    .btn-connect-large {
      padding: 1.2rem 3rem;
      font-size: 1.1rem;
      background: rgba(234, 179, 8, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 0 15px transparent;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .btn-connect-large:hover {
      background: var(--accent);
      color: #000;
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 30px var(--accent-glow);
    }
    /* Ikon dompet simple (SVG) */
    .wallet-icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* --- MAIN APP (Disembunyikan pada awalnya) --- */
    #app-container {
      display: none; /* Akan diubah menjadi block setelah connect */
      opacity: 0;
      transition: opacity 0.8s ease;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(234, 179, 8, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(234, 179, 8, 0.03), transparent 25%);
      min-height: 100vh;
    }
    header {
      padding: 2rem;
      text-align: center;
      border-bottom: 1px solid var(--card-border);
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-content {
      flex: 1;
      text-align: center;
    }
    header h1 {
      font-family: 'Cinzel', serif;
      margin: 0;
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    p.subtitle {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-weight: 300;
    }
    .btn-connect {
      padding: 0.8rem 1.5rem;
      background: rgba(234, 179, 8, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-connect:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .gallery-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      padding: 3rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .genesis-slot {
      aspect-ratio: 1;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }
    .genesis-slot:hover {
      transform: translateY(-5px) scale(1.05);
      border-color: var(--accent);
      box-shadow: 0 10px 20px var(--accent-glow);
      z-index: 10;
    }
    .slot-no {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      position: absolute;
      top: 6px;
      left: 8px;
      z-index: 2;
    }
    .empty-slot-logo {
      width: 40%;
      height: 40%;
      object-fit: contain;
      opacity: 0.1;
      filter: grayscale(100%);
      transition: all 0.4s ease;
    }
    .genesis-slot:hover .empty-slot-logo {
      opacity: 0.5;
      filter: grayscale(0%) drop-shadow(0 0 10px rgba(234, 179, 8, 0.5));
      transform: scale(1.15) rotate(5deg);
    }
    .genesis-slot.claimed {
      background: rgba(234, 179, 8, 0.05);
      border-color: rgba(234, 179, 8, 0.4);
    }
    .genesis-slot.claimed .empty-slot-logo {
      display: none;
    }
    .genesis-slot.claimed .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: opacity 0.3s, transform 0.5s;
    }
    .genesis-slot.claimed:hover .card-img {
      opacity: 1;
      transform: scale(1.1);
    }
    .slot-owner-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      padding: 4px;
      font-size: 0.6rem;
      text-align: center;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      color: var(--accent);
    }
    .genesis-slot.claimed:hover .slot-owner-info {
      transform: translateY(0);
    }
    
    /* BACK TO TOP BUTTON */
    #btn-back-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 50px;
      height: 50px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4);
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
      transition: all 0.3s ease;
      z-index: 100;
    }
    #btn-back-to-top.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    #btn-back-to-top:hover {
      transform: translateY(-5px) scale(1.1);
      box-shadow: 0 6px 20px rgba(234, 179, 8, 0.6);
    }
    #btn-back-to-top svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* SEARCH TOOLBAR */
    .toolbar {
      max-width: 1400px;
      margin: 2rem auto 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 4px 8px 4px 16px;
      transition: all 0.3s;
    }
    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(234, 179, 8, 0.2);
    }
    .search-box input {
      background: none;
      border: none;
      color: #fff;
      font-size: 1rem;
      width: 140px;
      outline: none;
      font-family: 'Outfit', sans-serif;
    }
    .search-box input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    .search-suffix {
      color: rgba(255, 255, 255, 0.4);
      margin-right: 12px;
      font-weight: 600;
    }
    .btn-search {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 16px;
      padding: 6px 16px;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      transition: transform 0.2s;
    }
    .btn-search:hover {
      transform: scale(1.05);
    }
    /* Hide input number arrows */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
    
    /* MODAL */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }
    .modal {
      background: #18181b;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 2.5rem;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.active .modal {
      transform: translateY(0);
    }
    .modal h2 { 
      margin-top: 0; 
      font-weight: 600;
      color: var(--accent);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 1rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 0.9rem;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      box-sizing: border-box;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.2);
    }
    button.btn-submit {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
      font-family: 'Outfit', sans-serif;
    }
    button.btn-submit:hover {
      background: #facc15;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(234, 179, 8, 0.3);
    }
    button.btn-submit:disabled {
      background: #475569;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .close-btn {
      float: right;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
    .close-btn:hover {
      color: #fff;
      background: rgba(234, 179, 8, 0.2);
      transform: rotate(90deg);
    }
    .status-msg {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
      color: var(--accent);
      min-height: 1.2rem;
    }

    /* Loader */
    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,0.3);
      border-radius: 50%;
      border-top-color: #000;
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* FOOTER CREDITS */
    .footer-credits {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10000;
      background: rgba(9, 9, 11, 0.7);
      padding: 10px 18px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
    }
    .footer-credits:hover {
      border-color: rgba(234, 179, 8, 0.3);
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .footer-credits span {
      font-size: 0.85rem;
      color: #cbd5e1;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
    }
    .footer-credits a {
      display: flex;
      align-items: center;
      color: #94a3b8;
      transition: color 0.3s, transform 0.2s;
    }
    .footer-credits a:hover {
      color: var(--accent);
      transform: scale(1.15);
    }
    .footer-credits svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* RESPONSIVE (MOBILE) */
    .header-left { width: 150px; }
    .header-right { width: 150px; text-align: right; }
    
    @media (max-width: 768px) {
      header {
        display: block; /* Ubah flex menjadi block */
        position: relative; /* Agar child bisa pakai absolute */
        padding: 1rem;
        padding-top: 5rem; /* Ruang lebih besar di atas untuk logo dan tombol */
        text-align: center;
      }
      .header-left { display: none; }
      .header-right {
        position: absolute;
        top: 1.5rem;
        right: 1rem;
        width: auto;
      }
      .header-content {
        width: 100%;
        text-align: center;
      }
      header h1 { font-size: 1.3rem; margin-top: 0.5rem; }
      p.subtitle { font-size: 0.75rem; }
      .btn-connect { padding: 0.5rem 0.8rem; font-size: 0.75rem; width: auto; margin-top: 0; }
      
      .global-logo {
        width: 45px;
        height: 45px;
        top: 1rem;
        left: 1rem;
      }
      .footer-credits {
        bottom: 1rem;
        left: 1rem;
        padding: 8px 14px;
      }
      .footer-credits span { font-size: 0.75rem; }
      .footer-credits svg { width: 16px; height: 16px; }
      
      .landing-content { padding: 1.5rem; margin: 1rem; }
      .landing-content h1 { font-size: 1.8rem; }
      .btn-connect-large { padding: 1rem; font-size: 0.85rem; }
      
      .toolbar { justify-content: center; margin-top: 1.5rem; }
      .search-box input { width: 120px; }
      
      #btn-back-to-top {
        bottom: 5rem; /* above footer */
        right: 1rem;
        width: 45px;
        height: 45px;
      }
    }
  </style>
</head>
<body>

  <!-- GLOBAL LOGO -->
  <img src="LOGO_RITUAL.png" class="global-logo" alt="Ritual Logo" onerror="this.style.display='none'" />

  <!-- LANDING PAGE -->
  <div id="landing-page">
    <div class="landing-content">
      <img src="floating.png" class="floating-bg" alt="Floating Element" />
      <div style="position: relative; z-index: 2;">
        <h1>WELCOME GALLERY GENESIS</h1>
        <p>Decentralized Archive of Ritual Map Genesis Cards</p>
        <button class="btn-connect-large" onclick="enterGalleryOnly()">
          ENTER GALLERY
        </button>
      </div>
    </div>
  </div>

  <!-- MAIN APP CONTAINER -->
  <div id="app-container">
    <header>
      <div class="header-left"></div>
      <div class="header-content">
        <h1>RITUAL GENESIS GALLERY</h1>
        <p class="subtitle">Showcase your Genesis Card On-Chain</p>
      </div>
      <div class="header-right">
        <button class="btn-connect" id="btn-connect" onclick="connectWalletAndEnter()">Connect Wallet</button>
      </div>
    </header>

    <div class="toolbar">
      <div class="showcase-counter" style="font-size: 1.2rem; font-weight: 600; font-family: 'Cinzel', serif; letter-spacing: 1px;">
        Showcase Total: <span id="total-claimed" style="color: var(--accent); font-weight: 800;">0</span><span style="color: rgba(255,255,255,0.4); font-size: 1rem;"> / 1000</span>
      </div>
      <div class="search-box">
        <input type="number" id="search-input" placeholder="Search No..." min="1" max="1000">
        <span class="search-suffix">/ 1000</span>
        <button class="btn-search" onclick="scrollToSlot()">GO</button>
      </div>
    </div>

    <div class="gallery-container" id="gallery">
      <!-- Slots generated dynamically -->
    </div>

    <div class="modal-overlay" id="modal">
      <div class="modal">
        <span class="close-btn" onclick="closeModal()">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </span>
        <h2 id="modal-title">Showcase Genesis #</h2>
        
        <!-- FORM VIEW (For Unclaimed Slots) -->
        <div id="modal-form-view">
          <div class="form-group">
            <label>X (Twitter) Handle</label>
            <input type="text" id="x-handle" placeholder="@0xkrta">
          </div>
          <div class="form-group">
            <label>Discord Handle</label>
            <input type="text" id="discord-handle" placeholder="@0xkrtka">
          </div>
          <div class="form-group">
            <label>Image Link / Genesis URL</label>
            <input type="text" id="genesis-link" placeholder="https://www.ritualmap.net/genesis/...">
          </div>
          <button class="btn-submit" id="btn-submit" onclick="submitClaim()">
            <span id="btn-text">Showcase with Gas Fee</span>
            <div class="loader" id="submit-loader"></div>
          </button>
        </div>

        <!-- CARD VIEW (For Claimed Slots) -->
        <div id="modal-card-view" style="display: none; text-align: center; position: relative;">
          <img id="card-view-img" src="" style="width: 100%; max-width: 400px; border-radius: 12px; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
          <div style="font-size: 1rem; margin-bottom: 0.5rem;">
            <span style="color: #888;">Owner:</span> <span id="card-view-owner" style="color: var(--accent); font-weight: bold;"></span>
          </div>
          <div style="margin-bottom: 1rem;">
            <a id="card-view-share-x" href="#" target="_blank" rel="noopener noreferrer" style="display: inline-flex; align-items: center; gap: 8px; background: #000; color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)';" onmouseout="this.style.background='#000';">
              <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              Share on X
            </a>
          </div>
          <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 1rem;">
            <div style="background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 8px; flex: 1;">
              <span style="font-size: 0.75rem; color: #888; display: block; margin-bottom: 4px;">X (Twitter)</span>
              <span id="card-view-x" style="font-size: 1rem; font-weight: 600;"></span>
            </div>
            <div style="background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 8px; flex: 1;">
              <span style="font-size: 0.75rem; color: #888; display: block; margin-bottom: 4px;">Discord</span>
              <span id="card-view-discord" style="font-size: 1rem; font-weight: 600;"></span>
            </div>
          </div>
          
          <button id="btn-admin-delete" style="display: none; background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; position: absolute; bottom: 0; right: 0; transition: all 0.2s;" onclick="submitAdminDelete()" onmouseover="this.style.background='var(--danger)'; this.style.color='#fff';" onmouseout="this.style.background='transparent'; this.style.color='var(--danger)';">
            <span id="btn-delete-text">Delete</span>
            <div class="loader" id="delete-loader" style="width: 10px; height: 10px; border-width: 2px;"></div>
          </button>
        </div>
        <div class="status-msg" id="status-msg"></div>
      </div>
    </div>

    <!-- WALLET MODAL -->
    <div class="modal-overlay" id="wallet-modal">
      <div class="modal" style="max-width: 320px;">
        <span class="close-btn" onclick="document.getElementById('wallet-modal').classList.remove('active')">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </span>
        <h2 style="text-align: center; margin-bottom: 1rem; border:none; padding:0;">Select Wallet</h2>
        <button class="btn-submit" onclick="connectMetaMask()" style="margin-top:0.5rem; display:flex; align-items:center; justify-content:center; gap:10px; font-size:1rem; border-radius:12px;">
          <svg viewBox="0 0 318.6 318.6" width="20" height="20"><path fill="#e2761b" d="m274.1 35.5-99.5 73.9L193 65.8z"/><path fill="#e4761b" d="m44.4 35.5 98.7 74.6-17.5-44.3zm193.9 171.3-26.5 40.6 56.7 15.6 16.3-55.3zm-204.4.9L50.1 263l56.7-15.6-26.5-40.6z"/><path fill="#e4761b" d="m103.6 138.2-15.8 23.9 56.3 2.5-2-60.5zm111.3 0-39-34.8-1.3 61.2 56.2-2.5zM106.8 247.4l33.8-16.5-29.2-22.8zm71.1-16.5 33.9 16.5-4.7-39.3z"/><path fill="#d7c1b3" d="m211.8 247.4-33.9-16.5 2.7 22.1-.3 9.3zm-105 0 31.5 14.9-.2-9.3 2.5-22.1z"/><path fill="#233447" d="m138.8 193.5-28.2-8.3 19.9-9.1zm40.9 0 8.3-17.4 20 9.1z"/><path fill="#cd6116" d="m106.8 247.4 4.8-40.6-31.3.9zM207 206.8l4.8 40.6 26.5-39.7zm23.8-44.7-56.2 2.5 5.2 28.9 8.3-17.4 20 9.1zm-120.2 23.1 20-9.1 8.2 17.4 5.3-28.9-56.3-2.5z"/><path fill="#e4751f" d="m87.8 162.1 23.6 46-.8-22.9zm120.3 23.1-1 22.9 23.7-46zm-64-20.6-5.3 28.9 6.6 34.1 1.5-44.9zm30.5 0-2.7 18 1.2 45 6.7-34.1z"/><path fill="#f6851b" d="m179.8 193.5-6.7 34.1 4.8 3.3 29.2-22.8 1-22.9zm-69.2-8.3.8 22.9 29.2 22.8 4.8-3.3-6.6-34.1z"/><path fill="#c0ad9e" d="m180.3 262.3.3-9.3-2.5-2.2h-37.7l-2.3 2.2.2 9.3-31.5-14.9 11 9 22.3 15.5h38.3l22.4-15.5 11-9z"/><path fill="#161616" d="m177.9 230.9-4.8-3.3h-27.7l-4.8 3.3-2.5 22.1 2.3-2.2h37.7l2.5 2.2z"/><path fill="#763d16" d="m278.3 114.2 8.5-40.8-12.7-37.9-96.2 71.4 37 31.3 52.3 15.3 11.6-13.5-5-3.6 8-7.3-6.2-4.8 8-6.1zM31.8 73.4l8.5 40.8-5.4 4 8 6.1-6.1 4.8 8 7.3-5 3.6 11.5 13.5 52.3-15.3 37-31.3-96.2-71.4z"/><path fill="#f6851b" d="m267.2 153.5-52.3-15.3 15.9 23.9-23.7 46 31.2-.4h46.5zm-163.6-15.3-52.3 15.3-17.4 54.2h46.4l31.1.4-23.6-46zm71 26.4 3.3-57.7 15.2-41.1h-67.5l15 41.1 3.5 57.7 1.2 18.2.1 44.8h27.7l.2-44.8z"/></svg>
          MetaMask
        </button>
        <button class="btn-submit" onclick="connectOKX()" style="margin-top:1rem; background:#000; color:#fff; display:flex; align-items:center; justify-content:center; gap:10px; font-size:1rem; border:1px solid #333; border-radius:12px;">
          <svg viewBox="0 0 40 40" width="20" height="20" fill="none"><path d="M15.5 10h-5A.5.5 0 0 0 10 10.5v5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-5a.5.5 0 0 0-.5-.5zm14 0h-5a.5.5 0 0 0-.5.5v5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-5a.5.5 0 0 0-.5-.5zm-7 7h-5a.5.5 0 0 0-.5.5v5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-5a.5.5 0 0 0-.5-.5zm-7 7h-5a.5.5 0 0 0-.5.5v5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-5a.5.5 0 0 0-.5-.5zm14 0h-5a.5.5 0 0 0-.5.5v5a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-5a.5.5 0 0 0-.5-.5z" fill="#fff"/></svg>
          OKX Wallet
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.10.0/ethers.umd.min.js"></script>
  <script>
    // Smart Contract Configuration
    const CONTRACT_ADDRESS = "0x914d309524dC235D75FfAf14427bC353eCee0f48"; 
    
    const ABI = [
      "function claimSlot(uint256 _genesisNo, string _xHandle, string _discordHandle, string _imageLink) external",
      "function deleteSlot(uint256 _genesisNo) external",
      "function getAllGallery() external view returns (tuple(address owner, string xHandle, string discordHandle, string imageLink, bool isClaimed)[])"
    ];

    const TOTAL_SLOTS = 1000;
    const galleryEl = document.getElementById('gallery');
    
    let selectedSlot = null;
    let provider, signer, contract;
    let userAddress = null;
    let galleryData = {}; // Store loaded card data

    // Inisialisasi Galeri Kosong
    function initGallery() {
      galleryEl.innerHTML = '';
      for (let i = 1; i <= TOTAL_SLOTS; i++) {
        const slot = document.createElement('div');
        slot.className = 'genesis-slot';
        slot.id = `slot-${i}`;
        slot.innerHTML = `
          <span class="slot-no">#${i}</span>
          <img src="LOGO_RITUAL.png" class="empty-slot-logo" alt="Empty" onerror="this.style.display='none'" />
        `;
        slot.onclick = () => openModal(i);
        galleryEl.appendChild(slot);
      }
      
      // Add Enter key event listener for search
      document.getElementById('search-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          scrollToSlot();
        }
      });
    }

    // Masuk tanpa wallet (Read Only)
    async function enterGalleryOnly() {
      enterMainGallery();
      if (!contract) {
        try {
          const readProvider = new ethers.JsonRpcProvider("https://rpc.ritualfoundation.org");
          contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, readProvider);
          loadGalleryData();
        } catch (err) {
          console.error("Failed to init read-only provider", err);
        }
      }
    }

    function connectWalletAndEnter() {
      document.getElementById('wallet-modal').classList.add('active');
    }

    async function finishConnect(rawProvider) {
      try {
        // Check and switch network to Ritual
        try {
          await rawProvider.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId: '0x7bb' }], // 1979 in hex
          });
        } catch (switchError) {
          if (switchError.code === 4902) {
            try {
              await rawProvider.request({
                method: 'wallet_addEthereumChain',
                params: [{
                  chainId: '0x7bb',
                  chainName: 'Ritual',
                  rpcUrls: ['https://rpc.ritualfoundation.org'],
                  nativeCurrency: { name: 'RITUAL', symbol: 'RITUAL', decimals: 18 },
                  blockExplorerUrls: ['https://explorer.ritualfoundation.org']
                }]
              });
            } catch (addError) {
              alert("Please add and switch to the Ritual network to continue.");
              return;
            }
          } else {
            alert("Please switch to the Ritual network to continue.");
            return;
          }
        }

        provider = new ethers.BrowserProvider(rawProvider);
        const accounts = await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        userAddress = accounts[0];
        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        
        document.getElementById('wallet-modal').classList.remove('active');

        const btnConnect = document.getElementById('btn-connect');
        btnConnect.innerText = userAddress.substring(0, 6) + "..." + userAddress.substring(38);
        btnConnect.style.background = "var(--accent)";
        btnConnect.style.color = "#000";
        btnConnect.onclick = disconnectWallet;
        
        btnConnect.addEventListener('mouseenter', () => {
          if (userAddress) {
            btnConnect.innerText = "Disconnect";
            btnConnect.style.background = "var(--danger)";
            btnConnect.style.color = "#fff";
            btnConnect.style.borderColor = "var(--danger)";
          }
        });
        btnConnect.addEventListener('mouseleave', () => {
          if (userAddress) {
            btnConnect.innerText = userAddress.substring(0, 6) + "..." + userAddress.substring(38);
            btnConnect.style.background = "var(--accent)";
            btnConnect.style.color = "#000";
            btnConnect.style.borderColor = "var(--accent)";
          }
        });
        
        enterMainGallery();
        loadGalleryData();

        // Listeners for the selected provider
        rawProvider.on('chainChanged', (chainId) => {
          if (userAddress && chainId !== '0x7bb' && chainId !== '0x7BB' && chainId !== 1979) {
            alert("Network changed. Please switch back to Ritual network.");
            window.location.reload();
          }
        });
        rawProvider.on('accountsChanged', () => {
          if (userAddress) window.location.reload();
        });

      } catch (error) {
        console.error("Connection error", error);
        alert(error.message || "Connection failed");
      }
    }

    async function connectMetaMask() {
      const eth = window.ethereum;
      let mmProvider = null;
      if (eth) {
        if (eth.providers) mmProvider = eth.providers.find(p => p.isMetaMask);
        else if (eth.isMetaMask) mmProvider = eth;
      }
      if (!mmProvider) return alert("MetaMask not found!");
      await finishConnect(mmProvider);
    }

    async function connectOKX() {
      let okxProvider = window.okxwallet;
      if (!okxProvider) {
        const eth = window.ethereum;
        if (eth && eth.providers) okxProvider = eth.providers.find(p => p.isOKExWallet || p.isOKX);
        else if (eth && (eth.isOKExWallet || eth.isOKX)) okxProvider = eth;
      }
      if (!okxProvider) return alert("OKX Wallet not found! Please install the extension.");
      await finishConnect(okxProvider);
    }

    function disconnectWallet() {
      userAddress = null;
      signer = null;
      provider = null;
      contract = null;
      // Reload halaman untuk mereset state dan kembali ke landing page
      window.location.reload();
    }

    function enterMainGallery() {
      const landing = document.getElementById('landing-page');
      const app = document.getElementById('app-container');
      
      landing.style.opacity = '0';
      setTimeout(() => {
        landing.style.display = 'none';
        app.style.display = 'block';
        setTimeout(() => {
          app.style.opacity = '1';
        }, 50);
      }, 800);
    }

    // Load Data dari Smart Contract
    async function loadGalleryData() {
      if (!contract) return;
      
      try {
        const allCards = await contract.getAllGallery();
        
        let claimedCount = 0;
        allCards.forEach((card, index) => {
          const slotNo = index + 1;
          if (card.isClaimed) {
            claimedCount++;
            galleryData[slotNo] = card;
            updateSlotUI(slotNo, card);
          }
        });
        const totalEl = document.getElementById('total-claimed');
        if (totalEl) totalEl.innerText = claimedCount;
      } catch (error) {
        console.error("Error loading gallery data.", error);
      }
    }

    // Update UI Slot
    function updateSlotUI(slotNo, cardData) {
      const slot = document.getElementById(`slot-${slotNo}`);
      if (!slot) return;
      
      slot.classList.add('claimed');
      
      let imgSrc = cardData.imageLink;
      
      if (imgSrc && imgSrc.includes("ritualmap.net/genesis/")) {
        if (!imgSrc.endsWith("/card")) {
          if (imgSrc.endsWith("/")) imgSrc = imgSrc.slice(0, -1);
          imgSrc = imgSrc + "/card";
        }
      } else if (!imgSrc || !imgSrc.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
        imgSrc = `https://api.dicebear.com/7.x/identicon/svg?seed=${slotNo}&backgroundColor=eab308`;
      }

      slot.innerHTML = `
        <span class="slot-no">#${slotNo}</span>
        <img class="card-img" src="${imgSrc}" onerror="this.src='https://api.dicebear.com/7.x/identicon/svg?seed=${slotNo}&backgroundColor=eab308'" />
        <div class="slot-owner-info">
          <div>${cardData.xHandle || '-'}</div>
        </div>
      `;
    }

    function scrollToSlot() {
      const val = document.getElementById('search-input').value;
      const num = parseInt(val);
      if (isNaN(num) || num < 1 || num > 1000) {
        alert("Please enter a valid Genesis number between 1 and 1000.");
        return;
      }
      
      const slotEl = document.getElementById(`slot-${num}`);
      if (slotEl) {
        slotEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        // Add a temporary glow effect
        slotEl.style.transition = "all 0.5s ease";
        slotEl.style.boxShadow = "0 0 30px rgba(234, 179, 8, 0.8)";
        slotEl.style.transform = "scale(1.05)";
        slotEl.style.zIndex = "10";
        
        setTimeout(() => {
          slotEl.style.boxShadow = "";
          slotEl.style.transform = "";
          slotEl.style.zIndex = "";
        }, 2000);
      }
    }

    // Modal Logic
    function openModal(slotNo) {
      selectedSlot = slotNo;
      document.getElementById('modal-title').innerText = `Showcase Genesis #${slotNo}`;
      document.getElementById('status-msg').innerText = '';
      
      const isClaimed = document.getElementById(`slot-${slotNo}`).classList.contains('claimed');
      const isAdmin = userAddress && userAddress.toLowerCase() === "0xf323551231727559a8b2684f8f039c37b693E5d7".toLowerCase();
      
      const formView = document.getElementById('modal-form-view');
      const cardView = document.getElementById('modal-card-view');
      const deleteBtn = document.getElementById('btn-admin-delete');

      if (isClaimed) {
        document.getElementById('modal-title').innerText = `Genesis #${slotNo}`;
        formView.style.display = 'none';
        cardView.style.display = 'block';

        const cardData = galleryData[slotNo];
        if (cardData) {
          let imgSrc = cardData.imageLink;
          if (imgSrc && imgSrc.includes("ritualmap.net/genesis/")) {
            if (!imgSrc.endsWith("/card")) {
              if (imgSrc.endsWith("/")) imgSrc = imgSrc.slice(0, -1);
              imgSrc = imgSrc + "/card";
            }
          } else if (!imgSrc || !imgSrc.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
            imgSrc = `https://api.dicebear.com/7.x/identicon/svg?seed=${slotNo}&backgroundColor=eab308`;
          }
          
          document.getElementById('card-view-img').src = imgSrc;
          
          let ownerDisplay = "-";
          if (cardData.owner) {
            if (cardData.owner.toLowerCase() === "0xf323551231727559a8b2684f8f039c37b693e5d7".toLowerCase()) {
              ownerDisplay = "Input by Developer";
            } else {
              ownerDisplay = cardData.owner.substring(0, 6) + "..." + cardData.owner.substring(38);
            }
          }
          document.getElementById('card-view-owner').innerText = ownerDisplay;
          
          document.getElementById('card-view-x').innerText = cardData.xHandle || "-";
          document.getElementById('card-view-discord').innerText = cardData.discordHandle || "-";
          
          let originalLink = cardData.imageLink || "https://genesis-ritual.vercel.app/";
          
          const tweetText = `My Genesis. On display. Forever.\n\n#${slotNo} / 1000\nhttps://genesis-ritual.vercel.app/\n\n@ritualnet @0xkrtka #BuildOnRitual #Genesis1000`;
          document.getElementById('card-view-share-x').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}&url=${encodeURIComponent(originalLink)}`;
        }

        if (isAdmin) {
          deleteBtn.style.display = 'block';
        } else {
          deleteBtn.style.display = 'none';
        }
      } else {
        document.getElementById('modal-title').innerText = `Showcase Genesis #${slotNo}`;
        formView.style.display = 'block';
        cardView.style.display = 'none';
        deleteBtn.style.display = 'none';
      }

      const modal = document.getElementById('modal');
      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    async function submitAdminDelete() {
      if (!contract) return;
      const statusMsg = document.getElementById('status-msg');
      const btnText = document.getElementById('btn-delete-text');
      const loader = document.getElementById('delete-loader');

      try {
        btnText.style.display = "none";
        loader.style.display = "block";
        statusMsg.style.color = "#fbbf24"; 
        statusMsg.innerText = "Please confirm delete transaction in MetaMask...";

        const tx = await contract.deleteSlot(selectedSlot);
        
        statusMsg.innerText = "Transaction sent. Waiting for network confirmation...";

        await tx.wait();

        statusMsg.style.color = "#4ade80"; 
        statusMsg.innerText = "Successfully Deleted!";
        
        // Reset UI
        const slot = document.getElementById(`slot-${selectedSlot}`);
        slot.classList.remove('claimed');
        slot.innerHTML = `
          <span class="slot-no">#${selectedSlot}</span>
          <img src="LOGO_RITUAL.png" class="empty-slot-logo" alt="Empty" onerror="this.style.display='none'" />
        `;
        
        setTimeout(closeModal, 2000);
      } catch (error) {
        console.error(error);
        statusMsg.style.color = "#ef4444"; 
        statusMsg.innerText = "Transaction failed or rejected.";
      } finally {
        btnText.style.display = "inline";
        loader.style.display = "none";
      }
    }

    // Submit ke Blockchain
    async function submitClaim() {
      if (!signer || !contract) {
        alert("Please Connect Wallet first!");
        return;
      }

      const xHandle = document.getElementById('x-handle').value;
      const discordHandle = document.getElementById('discord-handle').value;
      const genesisLink = document.getElementById('genesis-link').value;

      if (!xHandle || !genesisLink) {
        document.getElementById('status-msg').innerText = "Incomplete data!";
        document.getElementById('status-msg').style.color = "var(--danger)";
        return;
      }

      const btnSubmit = document.getElementById('btn-submit');
      const btnText = document.getElementById('btn-text');
      const loader = document.getElementById('submit-loader');
      const statusMsg = document.getElementById('status-msg');

      try {
        btnSubmit.disabled = true;
        btnText.style.display = 'none';
        loader.style.display = 'block';
        statusMsg.style.color = "var(--accent)";
        statusMsg.innerText = "Waiting for transaction confirmation (Gas Fee)...";

        const tx = await contract.claimSlot(
          selectedSlot,
          xHandle,
          discordHandle,
          genesisLink
        );

        statusMsg.innerText = "Transaction sent. Waiting for network confirmation...";

        await tx.wait();

        statusMsg.style.color = "#4ade80"; 
        statusMsg.innerText = "Successfully Showcased!";

        updateSlotUI(selectedSlot, {
          xHandle,
          discordHandle,
          imageLink: genesisLink,
          isClaimed: true
        });

        setTimeout(closeModal, 2000);
      } catch (error) {
        console.error(error);
        statusMsg.style.color = "var(--danger)";
        statusMsg.innerText = error.reason || "Transaction cancelled or failed.";
      } finally {
        btnSubmit.disabled = false;
        btnText.style.display = 'block';
        loader.style.display = 'none';
      }
    }

    window.onload = () => {
      initGallery();
      
      if (typeof window.ethereum !== 'undefined') {
        window.ethereum.request({ method: 'eth_accounts' }).then(accounts => {
          // Kita tidak auto-masuk ke gallery meskipun sudah connect, 
          // supaya user selalu melihat landing page terlebih dahulu.
          // Jika mau auto-masuk, uncomment baris di bawah ini:
          // if (accounts.length > 0) connectWalletAndEnter();
        });
        
        window.ethereum.on('accountsChanged', (accounts) => {
          if(accounts.length === 0) window.location.reload();
        });
      }
      
      // Show/hide Back to Top button
      window.addEventListener('scroll', () => {
        const btn = document.getElementById('btn-back-to-top');
        if (window.scrollY > 300) {
          btn.classList.add('show');
        } else {
          btn.classList.remove('show');
        }
      });
    };
  </script>
