<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritual Genesis Gallery</title>
  <link rel="icon" type="image/png" href="floating.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #eab308; /* Premium Gold */
      --accent-glow: rgba(234, 179, 8, 0.4);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', system-ui, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* --- LANDING PAGE --- */
    #landing-page {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      /* Background gambar yang diupload, asumsikan bernama 'landing-bg.png' di folder yang sama */
      background: url('landing-bg.png') center center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      text-align: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #landing-page::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      /* Overlay gelap agar teks lebih mudah dibaca dan memberikan kesan premium */
      background: radial-gradient(circle at center, rgba(9, 9, 11, 0.5) 0%, rgba(9, 9, 11, 0.95) 100%);
      backdrop-filter: blur(2px);
      z-index: 1;
    }
    .landing-content {
      position: relative;
      z-index: 2;
      padding: 3rem;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(234, 179, 8, 0.2);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      animation: floatIn 1.5s ease-out;
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .global-logo {
      position: fixed;
      top: 2rem;
      left: 2rem;
      width: 85px;
      height: 85px;
      object-fit: contain;
      animation: spinSlow 12s linear infinite;
      z-index: 10000;
      pointer-events: none;
      filter: drop-shadow(0 0 10px rgba(234, 179, 8, 0.3));
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .floating-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 400px;
      height: auto;
      transform: translate(-50%, -50%);
      z-index: 0;
      opacity: 0.25; /* Transparansi agar tidak menutupi teks */
      animation: floatObject 5s ease-in-out infinite;
      pointer-events: none; /* Agar tidak mengganggu klik */
    }
    @keyframes floatObject {
      0%, 100% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg); }
      50% { transform: translate(-50%, -50%) translateY(-25px) rotate(2deg); }
    }
    .landing-content h1 {
      font-family: 'Cinzel', serif;
      font-size: 3.5rem;
      margin: 0 0 1rem 0;
      background: linear-gradient(135deg, #fff, var(--accent), #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
      animation: shine 4s linear infinite;
    }
    @keyframes shine {
      to { background-position: 200% center; }
    }
    .landing-content p {
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      letter-spacing: 1px;
    }
    .btn-connect-large {
      padding: 1.2rem 3rem;
      font-size: 1.1rem;
      background: rgba(234, 179, 8, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 0 15px transparent;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .btn-connect-large:hover {
      background: var(--accent);
      color: #000;
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 30px var(--accent-glow);
    }
    /* Ikon dompet simple (SVG) */
    .wallet-icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* --- MAIN APP (Disembunyikan pada awalnya) --- */
    #app-container {
      display: none; /* Akan diubah menjadi block setelah connect */
      opacity: 0;
      transition: opacity 0.8s ease;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(234, 179, 8, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(234, 179, 8, 0.03), transparent 25%);
      min-height: 100vh;
    }
    header {
      padding: 2rem;
      text-align: center;
      border-bottom: 1px solid var(--card-border);
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-content {
      flex: 1;
      text-align: center;
    }
    header h1 {
      font-family: 'Cinzel', serif;
      margin: 0;
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    p.subtitle {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-weight: 300;
    }
    .btn-connect {
      padding: 0.8rem 1.5rem;
      background: rgba(234, 179, 8, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-connect:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .gallery-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      padding: 3rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .genesis-slot {
      aspect-ratio: 1;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }
    .genesis-slot:hover {
      transform: translateY(-5px) scale(1.05);
      border-color: var(--accent);
      box-shadow: 0 10px 20px var(--accent-glow);
      z-index: 10;
    }
    .slot-no {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      position: absolute;
      top: 6px;
      left: 8px;
      z-index: 2;
    }
    .slot-content {
      font-size: 2.5rem;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.05);
      transition: color 0.3s;
    }
    .genesis-slot:hover .slot-content {
      color: rgba(234, 179, 8, 0.2);
    }
    .genesis-slot.claimed {
      background: rgba(234, 179, 8, 0.05);
      border-color: rgba(234, 179, 8, 0.4);
    }
    .genesis-slot.claimed .slot-content {
      display: none;
    }
    .genesis-slot.claimed .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: opacity 0.3s, transform 0.5s;
    }
    .genesis-slot.claimed:hover .card-img {
      opacity: 1;
      transform: scale(1.1);
    }
    .slot-owner-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      padding: 4px;
      font-size: 0.6rem;
      text-align: center;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      color: var(--accent);
    }
    .genesis-slot.claimed:hover .slot-owner-info {
      transform: translateY(0);
    }
    
    /* MODAL */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }
    .modal {
      background: #18181b;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 2.5rem;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.active .modal {
      transform: translateY(0);
    }
    .modal h2 { 
      margin-top: 0; 
      font-weight: 600;
      color: var(--accent);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 1rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 0.9rem;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      box-sizing: border-box;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.2);
    }
    button.btn-submit {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
      font-family: 'Outfit', sans-serif;
    }
    button.btn-submit:hover {
      background: #facc15;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(234, 179, 8, 0.3);
    }
    button.btn-submit:disabled {
      background: #475569;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .close-btn {
      float: right;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.2rem;
      transition: color 0.2s;
    }
    .close-btn:hover {
      color: #fff;
    }
    .status-msg {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
      color: var(--accent);
      min-height: 1.2rem;
    }

    /* Loader */
    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,0.3);
      border-radius: 50%;
      border-top-color: #000;
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* FOOTER CREDITS */
    .footer-credits {
      position: fixed;
      bottom: 1.5rem;
      left: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10000;
      background: rgba(9, 9, 11, 0.7);
      padding: 10px 18px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
    }
    .footer-credits:hover {
      border-color: rgba(234, 179, 8, 0.3);
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .footer-credits span {
      font-size: 0.85rem;
      color: #cbd5e1;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
    }
    .footer-credits a {
      display: flex;
      align-items: center;
      color: #94a3b8;
      transition: color 0.3s, transform 0.2s;
    }
    .footer-credits a:hover {
      color: var(--accent);
      transform: scale(1.15);
    }
    .footer-credits svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* RESPONSIVE (MOBILE) */
    .header-left { width: 150px; }
    .header-right { width: 150px; text-align: right; }
    
    @media (max-width: 768px) {
      header {
        display: block; /* Ubah flex menjadi block */
        position: relative; /* Agar child bisa pakai absolute */
        padding: 1rem;
        padding-top: 5rem; /* Ruang lebih besar di atas untuk logo dan tombol */
        text-align: center;
      }
      .header-left { display: none; }
      .header-right {
        position: absolute;
        top: 1.5rem;
        right: 1rem;
        width: auto;
      }
      .header-content {
        width: 100%;
        text-align: center;
      }
      header h1 { font-size: 1.3rem; margin-top: 0.5rem; }
      p.subtitle { font-size: 0.75rem; }
      .btn-connect { padding: 0.5rem 0.8rem; font-size: 0.75rem; width: auto; margin-top: 0; }
      
      .global-logo {
        width: 45px;
        height: 45px;
        top: 1rem;
        left: 1rem;
      }
      .footer-credits {
        bottom: 1rem;
        left: 1rem;
        padding: 8px 14px;
      }
      .footer-credits span { font-size: 0.75rem; }
      .footer-credits svg { width: 16px; height: 16px; }
      
      .landing-content { padding: 1.5rem; margin: 1rem; }
      .landing-content h1 { font-size: 1.8rem; }
      .btn-connect-large { padding: 1rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <!-- GLOBAL LOGO -->
  <img src="LOGO_RITUAL.png" class="global-logo" alt="Ritual Logo" onerror="this.style.display='none'" />

  <!-- LANDING PAGE -->
  <div id="landing-page">
    <div class="landing-content">
      <img src="floating.png" class="floating-bg" alt="Floating Element" />
      <div style="position: relative; z-index: 2;">
        <h1>WELCOME GALLERY GENESIS</h1>
        <p>Decentralized Archive of Ritual Map Genesis Cards</p>
        <button class="btn-connect-large" onclick="connectWalletAndEnter()">
          <svg class="wallet-icon" viewBox="0 0 24 24">
            <path d="M19.333 9.667H20c1.103 0 2 .897 2 2v6c0 1.103-.897 2-2 2h-.667v1c0 1.103-.897 2-2 2H3c-1.103 0-2-.897-2-2V7c0-1.103.897-2 2-2h12.333a2 2 0 0 1 2 2v2.667zm-1.333 8.333v-6H15v6h3zM3 7v13.333h13.333V18H13c-1.103 0-2-.897-2-2v-6c0-1.103.897-2 2-2h3.333V7H3z"/>
          </svg>
          CONNECT WALLET METAMASK
        </button>
      </div>
    </div>
  </div>

  <!-- MAIN APP CONTAINER -->
  <div id="app-container">
    <header>
      <div class="header-left"></div>
      <div class="header-content">
        <h1>RITUAL GENESIS GALLERY</h1>
        <p class="subtitle">Claim and display your Genesis Card On-Chain</p>
      </div>
      <div class="header-right">
        <button class="btn-connect" id="btn-connect" onclick="connectWalletAndEnter()">Connected</button>
      </div>
    </header>

    <div class="gallery-container" id="gallery">
      <!-- Slots generated dynamically -->
    </div>

    <div class="modal-overlay" id="modal">
      <div class="modal">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <h2 id="modal-title">Claim Genesis #</h2>
        <div class="form-group">
          <label>X (Twitter) Handle</label>
          <input type="text" id="x-handle" placeholder="@0xkrta">
        </div>
        <div class="form-group">
          <label>Discord Handle</label>
          <input type="text" id="discord-handle" placeholder="@0xkrtka">
        </div>
        <div class="form-group">
          <label>Image Link / Genesis URL</label>
          <input type="text" id="genesis-link" placeholder="https://www.ritualmap.net/genesis/...">
        </div>
        <button class="btn-submit" id="btn-submit" onclick="submitClaim()">
          <span id="btn-text">Claim with Gas Fee</span>
          <div class="loader" id="submit-loader"></div>
        </button>
        <div class="status-msg" id="status-msg"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.10.0/ethers.umd.min.js"></script>
  <script>
    // Smart Contract Configuration
    // TODO: Ganti dengan alamat contract yang sudah di-deploy
    const CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000"; 
    
    const ABI = [
      "function claimSlot(uint256 _genesisNo, string _xHandle, string _discordHandle, string _imageLink) external",
      "function gallery(uint256) view returns (address owner, string xHandle, string discordHandle, string imageLink, bool isClaimed)",
      "function getAllGallery() external view returns (tuple(address owner, string xHandle, string discordHandle, string imageLink, bool isClaimed)[])"
    ];

    const TOTAL_SLOTS = 1000;
    const galleryEl = document.getElementById('gallery');
    
    let selectedSlot = null;
    let provider, signer, contract;
    let userAddress = null;

    // Inisialisasi Galeri Kosong
    function initGallery() {
      galleryEl.innerHTML = '';
      for (let i = 1; i <= TOTAL_SLOTS; i++) {
        const slot = document.createElement('div');
        slot.className = 'genesis-slot';
        slot.id = `slot-${i}`;
        slot.innerHTML = `
          <span class="slot-no">#${i}</span>
          <div class="slot-content">?</div>
        `;
        slot.onclick = () => openModal(i);
        galleryEl.appendChild(slot);
      }
    }

    // Connect Wallet (MetaMask) and transition to main app
    async function connectWalletAndEnter() {
      if (typeof window.ethereum !== 'undefined') {
        try {
          provider = new ethers.BrowserProvider(window.ethereum);
          const accounts = await provider.send("eth_requestAccounts", []);
          signer = await provider.getSigner();
          userAddress = accounts[0];
          
          contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
          
          const btnConnect = document.getElementById('btn-connect');
          btnConnect.innerText = userAddress.substring(0, 6) + "..." + userAddress.substring(38);
          btnConnect.style.background = "var(--accent)";
          btnConnect.style.color = "#000";
          
          // Ubah fungsi klik menjadi disconnect
          btnConnect.onclick = disconnectWallet;
          
          // Efek hover untuk menampilkan tulisan Disconnect
          btnConnect.addEventListener('mouseenter', () => {
            if (userAddress) {
              btnConnect.innerText = "Disconnect";
              btnConnect.style.background = "var(--danger)";
              btnConnect.style.color = "#fff";
              btnConnect.style.borderColor = "var(--danger)";
            }
          });
          btnConnect.addEventListener('mouseleave', () => {
            if (userAddress) {
              btnConnect.innerText = userAddress.substring(0, 6) + "..." + userAddress.substring(38);
              btnConnect.style.background = "var(--accent)";
              btnConnect.style.color = "#000";
              btnConnect.style.borderColor = "var(--accent)";
            }
          });
          
          // Transisi dari Landing Page ke Main App
          enterMainGallery();

          loadGalleryData();
        } catch (error) {
          console.error("User rejected request", error);
        }
      } else {
        alert("Please install MetaMask to use this dApp!");
      }
    }

    function disconnectWallet() {
      userAddress = null;
      signer = null;
      provider = null;
      contract = null;
      // Reload halaman untuk mereset state dan kembali ke landing page
      window.location.reload();
    }

    function enterMainGallery() {
      const landing = document.getElementById('landing-page');
      const app = document.getElementById('app-container');
      
      landing.style.opacity = '0';
      setTimeout(() => {
        landing.style.display = 'none';
        app.style.display = 'block';
        setTimeout(() => {
          app.style.opacity = '1';
        }, 50);
      }, 800);
    }

    // Load Data dari Smart Contract
    async function loadGalleryData() {
      if (!contract) return;
      
      try {
        const allCards = await contract.getAllGallery();
        
        allCards.forEach((card, index) => {
          const slotNo = index + 1;
          if (card.isClaimed) {
            updateSlotUI(slotNo, card);
          }
        });
      } catch (error) {
        console.error("Error loading gallery data.", error);
      }
    }

    // Update UI Slot
    function updateSlotUI(slotNo, cardData) {
      const slot = document.getElementById(`slot-${slotNo}`);
      if (!slot) return;
      
      slot.classList.add('claimed');
      
      let imgSrc = cardData.imageLink;
      if (!imgSrc.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
        imgSrc = `https://api.dicebear.com/7.x/identicon/svg?seed=${slotNo}&backgroundColor=eab308`;
      }

      slot.innerHTML = `
        <span class="slot-no">#${slotNo}</span>
        <img class="card-img" src="${imgSrc}" onerror="this.src='https://api.dicebear.com/7.x/identicon/svg?seed=${slotNo}&backgroundColor=eab308'" />
        <div class="slot-owner-info">
          <div>${cardData.xHandle || '-'}</div>
        </div>
      `;
    }

    // Modal Logic
    function openModal(slotNo) {
      selectedSlot = slotNo;
      document.getElementById('modal-title').innerText = `Claim Genesis #${slotNo}`;
      document.getElementById('status-msg').innerText = '';
      
      const modal = document.getElementById('modal');
      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    // Submit ke Blockchain
    async function submitClaim() {
      if (!signer || !contract) {
        alert("Please Connect Wallet first!");
        return;
      }

      const xHandle = document.getElementById('x-handle').value;
      const discordHandle = document.getElementById('discord-handle').value;
      const genesisLink = document.getElementById('genesis-link').value;

      if (!xHandle || !genesisLink) {
        document.getElementById('status-msg').innerText = "Incomplete data!";
        document.getElementById('status-msg').style.color = "var(--danger)";
        return;
      }

      const btnSubmit = document.getElementById('btn-submit');
      const btnText = document.getElementById('btn-text');
      const loader = document.getElementById('submit-loader');
      const statusMsg = document.getElementById('status-msg');

      try {
        btnSubmit.disabled = true;
        btnText.style.display = 'none';
        loader.style.display = 'block';
        statusMsg.style.color = "var(--accent)";
        statusMsg.innerText = "Waiting for transaction confirmation (Gas Fee)...";

        const tx = await contract.claimSlot(
          selectedSlot,
          xHandle,
          discordHandle,
          genesisLink
        );

        statusMsg.innerText = "Transaction sent. Waiting for network confirmation...";

        await tx.wait();

        statusMsg.style.color = "#4ade80"; 
        statusMsg.innerText = "Claim Successful!";

        updateSlotUI(selectedSlot, {
          xHandle,
          discordHandle,
          imageLink: genesisLink,
          isClaimed: true
        });

        setTimeout(closeModal, 2000);
      } catch (error) {
        console.error(error);
        statusMsg.style.color = "var(--danger)";
        statusMsg.innerText = error.reason || "Transaction cancelled or failed.";
      } finally {
        btnSubmit.disabled = false;
        btnText.style.display = 'block';
        loader.style.display = 'none';
      }
    }

    window.onload = () => {
      initGallery();
      
      if (typeof window.ethereum !== 'undefined') {
        window.ethereum.request({ method: 'eth_accounts' }).then(accounts => {
          // Kita tidak auto-masuk ke gallery meskipun sudah connect, 
          // supaya user selalu melihat landing page terlebih dahulu.
          // Jika mau auto-masuk, uncomment baris di bawah ini:
          // if (accounts.length > 0) connectWalletAndEnter();
        });
        
        window.ethereum.on('accountsChanged', (accounts) => {
          if(accounts.length === 0) window.location.reload();
        });
      }
    };
  </script>
